name: resale monitor 41

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: check resale
        run: |
          URL="https://relief-ticket.jp/events/artist/41/129"

          html=$(curl -s "$URL")

          if echo "$html" | grep -q "購入手続きへ"; then
            curl -X POST https://api.line.me/v2/bot/message/broadcast \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.LINE_TOKEN }}" \
            -d "{\"messages\":[{\"type\":\"text\",\"text\":\"リセール出品検知: $URL\"}]}"
          fi
